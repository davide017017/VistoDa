<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="../assets/favicon/icon-512x512.png" />
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#0f0f0f" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>VistoDa - Home</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />

    <style>
      /* ── Film-reel loading overlay ───────────────────────── */
      @keyframes vd-reel-spin {
        to {
          transform: rotate(360deg);
        }
      }

      #vd-loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9990;
        background: #0f0f0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.6rem;
        transition: opacity 0.45s ease;
      }
      #vd-loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #vd-reel {
        width: 64px;
        height: 64px;
        position: relative;
        animation: vd-reel-spin 1.6s linear infinite;
      }
      .vd-reel-ring {
        position: absolute;
        inset: 0;
        border: 2px solid #8c7a5b;
        border-radius: 50%;
        opacity: 0.65;
      }
      .vd-reel-hub {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 13px;
        height: 13px;
        background: #8c7a5b;
        border-radius: 50%;
      }
      .vd-reel-spoke {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 17px;
        height: 2px;
        background: #8c7a5b;
        transform-origin: 0% 50%;
        opacity: 0.55;
      }
      .vd-reel-hole {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #0f0f0f;
        border: 1.5px solid #8c7a5b;
        border-radius: 50%;
        opacity: 0.75;
      }
      .vd-loading-label {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #c8b898;
        font-family: "Courier New", monospace;
        transition: opacity 0.3s ease;
      }
    </style>
  </head>

  <body class="min-vh-100" style="background-color: #0f0f0f; color: #eaeaea">
    <!-- ── Film-reel loading overlay ── -->
    <div id="vd-loading-overlay">
      <div id="vd-reel">
        <div class="vd-reel-ring"></div>
        <div class="vd-reel-hub"></div>
        <!-- 3 spokes at 0° / 120° / 240° -->
        <div
          class="vd-reel-spoke"
          style="transform: translateY(-50%) rotate(0deg)"
        ></div>
        <div
          class="vd-reel-spoke"
          style="transform: translateY(-50%) rotate(120deg)"
        ></div>
        <div
          class="vd-reel-spoke"
          style="transform: translateY(-50%) rotate(240deg)"
        ></div>
        <!-- 8 sprocket holes on a circle of radius 24px around center (32,32) -->
        <div class="vd-reel-hole" style="top: 29px; left: 53px"></div>
        <div class="vd-reel-hole" style="top: 46px; left: 46px"></div>
        <div class="vd-reel-hole" style="top: 53px; left: 29px"></div>
        <div class="vd-reel-hole" style="top: 46px; left: 12px"></div>
        <div class="vd-reel-hole" style="top: 29px; left: 5px"></div>
        <div class="vd-reel-hole" style="top: 12px; left: 12px"></div>
        <div class="vd-reel-hole" style="top: 5px; left: 29px"></div>
        <div class="vd-reel-hole" style="top: 12px; left: 46px"></div>
      </div>
      <span class="vd-loading-label" id="vd-loading-msg">Caricamento</span>
    </div>

    <!-- Script messaggi rotanti — inline per partire subito, prima di home.js -->
    <script>
      (function () {
        const msgs = [
          "Caricamento",
          "Stiamo spolverando i popcorn \uD83C\uDF7F",
          "Il proiettore si sta scaldando...",
          "Quasi pronto, siediti comodo",
          "DB gratuito = suspense inclusa \uD83C\uDFAC",
          "Sto cercando i tuoi film...",
          "Regia di: un server lento \u2615",
          "Bobina in corso...",
          "Prenditi un attimo, ne vale la pena",
        ];
        let idx = 0;
        const el = document.getElementById("vd-loading-msg");
        window._vdMsgInterval = setInterval(() => {
          idx = (idx + 1) % msgs.length;
          if (el) {
            el.style.opacity = "0";
            setTimeout(() => {
              el.textContent = msgs[idx];
              el.style.opacity = "1";
            }, 150);
          }
        }, 2500);
      })();
    </script>

    <div class="container py-4">
      <vd-sync-button></vd-sync-button>
      <vd-tmdb-check-button></vd-tmdb-check-button>
      <vd-header></vd-header>

      <!-- ✅ CREATE BUTTON -->
      <vd-create-button></vd-create-button>
      <vd-media-modal></vd-media-modal>

      <vd-filters></vd-filters>
      <vd-media-list></vd-media-list>
      <vd-info-modal></vd-info-modal>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content border-0"
          style="
            background-color: #1a1a1a;
            box-shadow: 0 4px 20px rgba(220, 53, 69, 0.2);
          "
        >
          <div class="modal-body text-center p-4">
            <i class="bi bi-trash3" style="font-size: 2rem; color: #dc3545"></i>
            <p class="mt-3 mb-1 fw-medium" style="color: #e6d5b8">
              Vuoi eliminare questo elemento?
            </p>
            <p
              id="deleteModalTitle"
              class="mb-4"
              style="color: #8c7a5b; font-size: 0.9rem"
            ></p>
            <div class="d-flex gap-2 justify-content-center">
              <button
                type="button"
                class="btn btn-outline-secondary px-4"
                data-bs-dismiss="modal"
              >
                Annulla
              </button>
              <button
                type="button"
                id="deleteConfirmBtn"
                class="btn px-4"
                style="background-color: #dc3545; color: white"
              >
                Elimina
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div
      class="position-fixed top-0 start-50 translate-middle-x p-3"
      style="z-index: 9999"
    >
      <div
        id="appToast"
        class="toast align-items-center border-0 text-white"
        role="alert"
        style="
          background-color: #1a1a1a;
          box-shadow: -1px 4px 20px 15px rgba(140, 122, 91, 0.3);
        "
      >
        <div class="d-flex">
          <div class="toast-body" id="appToastMsg"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <!-- ✅ Bootstrap JS (necessario per Modal e Toast) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script
      type="module"
      src="./components/statistiche/box-statistiche.js"
    ></script>
    <script type="module" src="./components/vd-nick-name-modal.js"></script>
    <script type="module" src="./components/VdHeader.js"></script>
    <script type="module" src="./components/VdCreateButton.js"></script>
    <script type="module" src="./components/VdMediaModal.js"></script>
    <script type="module" src="./components/VdFilters.js"></script>
    <script type="module" src="./components/VdMediaList.js"></script>
    <script type="module" src="./components/VdInfoModal.js"></script>
    <script type="module" src="./components/VdSyncButton.js"></script>
    <script type="module" src="./components/VdTmdbReportModal.js"></script>
    <script type="module" src="./components/VdTmdbCheckButton.js"></script>

    <script type="module" src="./home.js"></script>
  </body>
</html>
