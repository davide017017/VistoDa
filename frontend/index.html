<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VistoDa</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico" />

    <!-- Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#0f0f0f" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="d-flex align-items-center justify-content-center vh-100"
    style="background-color: #0f0f0f; overflow: hidden"
  >
    <!-- Splash Content -->
    <div
      class="text-center"
      id="splash"
      style="opacity: 0; transition: opacity 0.8s ease"
    >
      <h1 style="color: #e6d5b8; letter-spacing: 2px">
        Visto<span style="color: #8c7a5b">Da</span>
      </h1>
      <small style="color: #5c5c5c">Track what you've watched</small>
    </div>

    <script type="module">
      const splash = document.getElementById("splash");

      // Fade in
      setTimeout(() => {
        splash.style.opacity = "1";
      }, 100);

      // Redirect dopo 1 secondo
      setTimeout(() => {
        const token = localStorage.getItem("token");

        if (token) {
          window.location.href = "./home/home.html";
        } else {
          window.location.href = "./login/login.html";
        }
      }, 1000);
    </script>
  </body>
</html>
