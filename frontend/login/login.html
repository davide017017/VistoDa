<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - VistoDa</title>

    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#0f0f0f" />

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="../assets/favicon/icon-512x512.png" />
  </head>

  <body
    class="d-flex align-items-center vh-100"
    style="background-color: #0f0f0f"
  >
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-4 col-lg-3">
          <div
            class="card border-0 shadow-lg"
            style="background-color: #1a1a1a"
          >
            <div class="card-body p-4">
              <!-- Logo / Titolo -->
              <h3 class="text-center fw-semibold mb-4" style="color: #e6d5b8">
                Visto<span style="color: #8c7a5b">Da</span>
              </h3>

              <!-- Form -->
              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <input
                    type="email"
                    id="email"
                    class="form-control border-0"
                    placeholder="Email"
                    required
                    style="background-color: #262626; color: #eaeaea"
                  />
                </div>

                <div class="mb-4">
                  <div class="input-group">
                    <input
                      type="password"
                      id="password"
                      class="form-control border-0"
                      placeholder="Password"
                      required
                      style="background-color: #262626; color: #eaeaea"
                    />
                    <button
                      type="button"
                      class="btn border-0"
                      style="background-color: #262626; color: #5c5c5c"
                      onclick="
                        const p = document.getElementById('password');
                        const i = this.querySelector('i');
                        if (p.type === 'password') {
                          p.type = 'text';
                          i.className = 'bi bi-eye-slash';
                        } else {
                          p.type = 'password';
                          i.className = 'bi bi-eye';
                        }
                      "
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>

                <button
                  class="btn w-100 fw-medium"
                  style="background-color: #8c7a5b; color: #0f0f0f"
                >
                  Accedi
                </button>
              </form>

              <div class="d-flex align-items-center my-3">
                <hr class="flex-grow-1" style="border-color: #333" />
                <small class="mx-2" style="color: #5c5c5c">oppure</small>
                <hr class="flex-grow-1" style="border-color: #333" />
              </div>

              <button
                id="demoBtn"
                type="button"
                class="btn w-100"
                style="
                  border: 1px solid #8c7a5b;
                  color: #8c7a5b;
                  background: transparent;
                "
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
                title="Accedi con un account di prova in sola lettura"
              >
                Accedi come Demo
              </button>
            </div>
          </div>

          <!-- Footer minimal -->
          <!-- Footer minimal -->
          <div class="text-center mt-4">
            <small style="color: #5c5c5c">
              © 2026 VistoDa · Creato da
              <a
                href="https://davide-martinico-portfolio.netlify.app/"
                target="_blank"
                rel="noopener noreferrer"
                style="color: #8c7a5b; text-decoration: none"
                >Davide Martinico</a
              >
            </small>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./login.js"></script>

    <!-- Bootstrap JS (per tooltip) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document
          .querySelectorAll('[data-bs-toggle="tooltip"]')
          .forEach((el) => {
            new bootstrap.Tooltip(el);
          });
      });
    </script>
  </body>
</html>
